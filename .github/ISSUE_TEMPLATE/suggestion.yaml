name: Suggestion
description: Suggest an idea for this project
title: "[Suggestion]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: related-to-problem
    attributes:
      label: Is your suggestion related to a problem?
      placeholder: Please describe if you do have a problem.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      placeholder: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: dropdown
    id: mod-loader
    attributes:
      label: Mod Loader
      options:
        - Forge
        - Fabric
        - Both
      multiple: true
    validations:
      required: true
  - type: input
    id: mod-version
    attributes:
      label: Mod Version
      placeholder: eg. 2026.2
    validations:
      required: true
  - type: textarea
    id: other-information
    attributes:
      label: Additional context
      description: Add any other context about the suggestion here.