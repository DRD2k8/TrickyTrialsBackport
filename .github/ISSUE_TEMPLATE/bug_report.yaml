name: Bug report
description: Create a report to help us improve
labels: ["bug"]
body:
  - type: textarea
    id: issue-description
    attributes:
      label: Describe the bug
      placeholder: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. First step
        2. Second step
        3. etc...
  - type: textarea
    id: expectation
    attributes:
      label: Expected Behaviour
      description: A clear and concise description of what you expected to happen.
  - type: input
    id: log-file
    attributes:
      label: Logs
      description: Add logs or crash reports.
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
  - type: dropdown
    id: mod-loader
    attributes:
      label: Mod Loader
      options:
        - Forge
        - Fabric
        - Both
      multiple : true
    validations :
      required : true
  - type: input
    id: mod-version
    attributes:
      label: Mod Version
      placeholder: eg. 2026.1
    validations:
      required: true
  - type: textarea
    id: other-information
    attributes:
      label: Additional context
      description: Add any other context about the problem here.